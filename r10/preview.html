<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>R10 비교 보기 | 도안호수러닝크루</title>
  <style>
    :root { font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif; color: #152327; background:#edf0eb; }
    * { box-sizing: border-box; }
    body { margin:0; padding:28px; }
    h1 { margin:0; font-size:26px; letter-spacing:-.06em; }
    p { color:#5d6d6d; }
    .intro { max-width:1180px; margin:0 auto 24px; }
    .intro a { display:inline-flex; margin-top:4px; padding:11px 15px; border-radius:999px; background:#152327; color:#fff; text-decoration:none; font-size:14px; font-weight:700; }
    .views { display:grid; grid-template-columns:minmax(0, 1fr) 430px; gap:28px; max-width:1180px; margin:0 auto; align-items:start; }
    .label { display:block; margin:0 0 10px; font-size:13px; font-weight:800; }
    .desktop, .phone { overflow:hidden; background:#fff; box-shadow:0 18px 50px rgba(21,35,39,.15); }
    .desktop { border-radius:16px; }
    .desktop iframe { display:block; width:100%; height:760px; border:0; }
    .phone-shell { width:390px; padding:10px; border:8px solid #152327; border-radius:42px; background:#152327; box-shadow:0 18px 50px rgba(21,35,39,.25); }
    .phone { border-radius:26px; }
    .phone iframe { display:block; width:374px; height:760px; border:0; }
    @media (max-width:850px) { body { padding:18px; } .views { grid-template-columns:1fr; } .phone-shell { margin:auto; } .desktop iframe { height:620px; } }
    @media (max-width:440px) { body { padding:14px; } .phone-shell { width:100%; border-width:6px; border-radius:28px; } .phone iframe { width:100%; } }
  </style>
</head>
<body>
  <div class="intro">
    <h1>R10 · 호수의 아침</h1>
    <p>왼쪽은 컴퓨터 화면, 오른쪽은 휴대폰 화면입니다. 아래로 스크롤하며 글자 크기와 사진·정보의 균형을 확인해 주세요.</p>
    <a href="index.html">휴대폰 전체 화면으로 보기 ↗</a>
  </div>
  <main class="views">
    <section>
      <span class="label">COMPUTER</span>
      <div class="desktop"><iframe title="R10 컴퓨터 화면" src="index.html"></iframe></div>
    </section>
    <section>
      <span class="label">MOBILE</span>
      <div class="phone-shell"><div class="phone"><iframe title="R10 휴대폰 화면" src="index.html"></iframe></div></div>
    </section>
  </main>
</body>
</html>
