<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>R11 색감 비교 | 도안호수러닝크루</title>
  <style>
    :root { font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif; color:#111827; background:#f1f5f9; }
    * { box-sizing:border-box; } body { margin:0; padding:32px; }
    header { max-width:1120px; margin:0 auto 28px; } h1 { margin:0; font-size:28px; letter-spacing:-.06em; } p { color:#64748b; }
    .choices { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:28px; max-width:1120px; margin:auto; }
    .choice { min-width:0; } .label { display:flex; align-items:center; gap:10px; margin:0 0 12px; font-size:16px; font-weight:800; }
    .dot { width:12px; height:12px; border-radius:50%; } .blue .dot { background:#2563eb; } .orange .dot { background:#ea580c; }
    .screen { overflow:hidden; border:1px solid rgba(15,23,42,.1); border-radius:18px; background:#fff; box-shadow:0 18px 48px rgba(15,23,42,.13); }
    iframe { display:block; width:100%; height:780px; border:0; }
    a { display:inline-flex; margin-top:16px; padding:11px 15px; border-radius:999px; color:#fff; text-decoration:none; font-size:14px; font-weight:750; }
    .blue a { background:#132c5b; }.orange a { background:#9a3412; }
    @media(max-width:780px) { body{padding:20px 16px}.choices{grid-template-columns:1fr;gap:32px}iframe{height:680px} }
  </style>
</head>
<body>
  <header>
    <h1>R11 · 색감만 비교해 보세요</h1>
    <p>구조와 글자는 같습니다. 초록·베이지를 없앤 뒤, 블루와 오렌지 중 더 마음에 드는 분위기를 골라 주세요.</p>
  </header>
  <main class="choices">
    <section class="choice blue">
      <div class="label"><span class="dot"></span> A. 딥 블루 · 시원하고 정돈된 스포츠</div>
      <div class="screen"><iframe title="블루 테스트" src="index.html?theme=blue"></iframe></div>
      <a href="index.html?theme=blue">블루 전체 화면 보기 ↗</a>
    </section>
    <section class="choice orange">
      <div class="label"><span class="dot"></span> B. 러닝 오렌지 · 밝고 활기찬 스포츠</div>
      <div class="screen"><iframe title="오렌지 테스트" src="index.html?theme=orange"></iframe></div>
      <a href="index.html?theme=orange">오렌지 전체 화면 보기 ↗</a>
    </section>
  </main>
</body>
</html>
