<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>R12 비교 보기 | 도안호수러닝크루</title>
  <style>
    :root { font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif; color:#10182b; background:#e9edf5; }
    * { box-sizing:border-box; } body { margin:0; padding:30px; } h1 { margin:0; font-size:27px; letter-spacing:-.07em; } p { color:#5f6a82; }
    header, main { width:min(1180px,100%); margin-inline:auto; } header { margin-bottom:24px; } .views { display:grid; grid-template-columns:minmax(0,1fr) 390px; gap:28px; align-items:start; }
    .label { display:block; margin-bottom:10px; font-size:11px; font-weight:800; letter-spacing:.08em; } .window { overflow:hidden; border:1px solid rgba(16,24,43,.12); background:#fff; box-shadow:0 22px 50px rgba(16,24,43,.15); }
    .desktop { border-radius:16px; }.desktop iframe { width:100%; height:790px; border:0; }.phone-shell { width:390px; padding:8px; border-radius:36px; background:#10182b; box-shadow:0 22px 50px rgba(16,24,43,.23); }.phone { border-radius:29px; }.phone iframe { display:block; width:374px; height:760px; border:0; }
    a { display:inline-flex; margin-top:8px; padding:12px 16px; background:#10182b; color:#fff; text-decoration:none; font-size:14px; font-weight:750; }
    @media(max-width:840px){ body{padding:20px 15px}.views{grid-template-columns:1fr}.phone-shell{margin:auto}.desktop iframe{height:620px} }
    @media(max-width:420px){ .phone-shell{width:100%;border-radius:28px}.phone iframe{width:100%} }
  </style>
</head>
<body>
  <header><h1>R12 · 러닝 매거진 테스트</h1><p>왼쪽은 컴퓨터 화면, 오른쪽은 휴대폰 화면입니다. 이번에는 색을 바꾼 기존 구조가 아닌, 첫 화면과 러닝 시간선부터 새로 설계했습니다.</p><a href="index.html">휴대폰 전체 화면으로 보기 ↗</a></header>
  <main class="views">
    <section><span class="label">DESKTOP</span><div class="window desktop"><iframe title="R12 데스크톱 화면" src="index.html"></iframe></div></section>
    <section><span class="label">MOBILE</span><div class="phone-shell"><div class="window phone"><iframe title="R12 휴대폰 화면" src="index.html"></iframe></div></div></section>
  </main>
</body>
</html>
