  <style>

    *{box-sizing:border-box} body{margin:0;padding:30px} header,main{width:min(1180px,100%);margin-inline:auto} header{margin-bottom:30px} h1{margin:0;font-size:28px;letter-spacing:-.07em} header p{color:#626a79}.themes{display:grid;gap:50px}.theme-grid{display:grid;grid-template-columns:minmax(0,1fr) 390px;gap:28px;align-items:start}.name{display:flex;align-items:center;gap:10px;margin:0 0 12px;font-size:17px;font-weight:800}.dot{width:13px;height:13px}.navy .dot{background:#ff6a3d}.race .dot{background:#f5cc37}.label{display:block;margin:0 0 10px;font-size:11px;font-weight:800;letter-spacing:.08em}.window{overflow:hidden;border:1px solid rgba(16,24,43,.12);background:#fff;box-shadow:0 20px 48px rgba(16,24,43,.14)}.desktop{border-radius:16px}.desktop iframe{display:block;width:100%;height:660px;border:0}.phone-shell{width:390px;padding:8px;border-radius:36px;background:#111318;box-shadow:0 20px 48px rgba(16,24,43,.22)}.phone{border-radius:29px}.phone iframe{display:block;width:374px;height:660px;border:0}.full{display:inline-flex;margin-top:12px;padding:11px 15px;color:#fff;text-decoration:none;font-size:14px;font-weight:750}.navy .full{background:#15233c}.race .full{background:#111318;color:#f5cc37}@media(max-width:840px){body{padding:20px 15px}.theme-grid{grid-template-columns:1fr}.phone-shell{margin:auto}.desktop iframe{height:560px}}@media(max-width:420px){.phone-shell{width:100%;border-radius:28px}.phone iframe{width:100%}}
